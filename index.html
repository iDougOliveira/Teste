<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3D AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
        }
        #ar-button {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #007AFF, #0056CC);
            color: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.4);
            cursor: pointer;
            z-index: 1000;
            min-width: 280px;
            transition: all 0.3s ease;
        }
        #ar-button:hover, #ar-button:active {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,122,255,0.6);
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 999;
            max-width: 90%;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <model-viewer
        id="model"
        src="object.usdz"
        ios-src="object.usdz"
        ar
        ar-modes="scene-viewer quick-look webxr"
        camera-controls
        auto-rotate
        style="width:100%; height:100vh;">
    </model-viewer>

    <div id="message">
        Clique para abrir modelo 3D
    </div>

    <button id="ar-button">
        📱 Ver em AR
    </button>

    <script>
        const model = document.querySelector('#model');
        const arButton = document.querySelector('#ar-button');
        const message = document.querySelector('#message');

        // Esconde mensagem e mostra botão após carregar o modelo
        model.addEventListener('load', () => {
            message.classList.add('hidden');
        });

        // Ativa AR exatamente como o ícone nativo
        arButton.addEventListener('click', () => {
            if (model.canActivateAR) {
                model.activateAR();
            } else {
                alert('AR só funciona em dispositivos móveis compatíveis (iPhone/Android).');
            }
        });

        // Detecta mobile e esconde botão se AR auto-ativar
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            // Mobile detectado
        }
    </script>
</body>
</html>
